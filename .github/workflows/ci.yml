name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  package:
    name: Package — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: types
            filter: '@ancore/types'
          - name: crypto
            filter: '@ancore/crypto'
          - name: stellar
            filter: '@ancore/stellar'
          - name: core-sdk
            filter: '@ancore/core-sdk'
          - name: ui-kit
            filter: '@ancore/ui-kit'
          - name: account-abstraction
            filter: '@ancore/account-abstraction'
          - name: wallet-shared
            filter: '@ancore/wallet-shared'
          - name: wallet-api
            filter: '@ancore/wallet-api'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter=${{ matrix.filter }}

      - name: Test
        run: pnpm turbo run test --filter=${{ matrix.filter }}

  app:
    name: App — ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: extension-wallet
            filter: '@ancore/extension-wallet'
          - name: web-dashboard
            filter: '@ancore/web-dashboard'
          - name: mobile-wallet
            filter: '@ancore/mobile-wallet'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter=${{ matrix.filter }}

      - name: Test
        run: pnpm turbo run test --filter=${{ matrix.filter }}

  services:
    name: Services — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint services
        run: pnpm turbo run lint --filter='@ancore/relayer' --filter='@ancore/ai-agent'

      - name: Test services
        run: pnpm turbo run test --filter='@ancore/relayer' --filter='@ancore/ai-agent' --concurrency=1

      - name: Check documented repository structure
        run: pnpm docs:check-structure

  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.81.0

      - name: Ensure Cargo cache directories exist
        run: |
          mkdir -p $HOME/.cargo/bin
          mkdir -p $HOME/.cargo/registry/index
          mkdir -p $HOME/.cargo/registry/cache
          mkdir -p $HOME/.cargo/git/db
          mkdir -p ${{ github.workspace }}/contracts/target

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ${{ github.workspace }}/contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - run: rustup target add wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: |
          mkdir -p ~/.local/bin
          curl -L https://github.com/stellar/stellar-cli/releases/download/v22.0.1/stellar-cli-22.0.1-x86_64-unknown-linux-gnu.tar.gz | tar xz -C ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          stellar version

      - name: Build contracts
        working-directory: ./contracts
        run: stellar contract build

      - name: Check Rust formatting
        working-directory: ./contracts
        run: cargo fmt --check

      - name: Run clippy
        working-directory: ./contracts
        run: cargo clippy -- -D warnings

      - name: Test contracts
        working-directory: ./contracts
        run: cargo test

      - name: Check WASM size regression
        run: node scripts/check-wasm-size.js

  indexer:
    name: Indexer — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint indexer migrations
        run: pnpm indexer:lint-migrations

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ${{ github.workspace }}/services/indexer/target
          key: ${{ runner.os }}-indexer-cargo-${{ hashFiles('services/indexer/Cargo.lock', 'services/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-indexer-cargo-

      - name: Check formatting
        working-directory: ./services/indexer
        run: cargo fmt --check

      - name: Run clippy
        working-directory: ./services/indexer
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ./services/indexer
        run: cargo test
